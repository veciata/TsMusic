name: tsmusic
description: "A Flutter app for playing and downloading music."
publish_to: "none"

version: 1.1.4

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.11

  # Audio
  media_kit: ^1.1.10+1
  media_kit_libs_audio: ^1.0.4
  audio_session: ^0.2.3
  audio_service: ^0.18.18

  # File Access
  file_picker: ^11.0.2
  path_provider: ^2.1.3
  path: ^1.9.0
  permission_handler: ^12.0.1
  device_info_plus: ^12.4.0
  cached_network_image: ^3.4.1

  # State Management
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  package_info_plus: ^9.0.1
  sqflite: ^2.3.0

  # Theming
  flex_color_scheme: ^8.2.0
  rxdart: ^0.28.0
  shimmer: ^3.0.0

  # YouTube
  youtube_explode_dart: ^3.0.5

  # Connectivity
  connectivity_plus: ^5.0.2

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # URL Launcher
  url_launcher: ^6.3.0

  # Desktop
  window_manager: ^0.5.1

  # UI components

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  sqflite_common_ffi: ^2.3.0
  mockito: ^5.4.4
  build_runner: ^2.4.6

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true