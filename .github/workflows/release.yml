name: Release

on:
  push:
    branches: [main, release, alpha]
    tags: ['v*']
  pull_request:
    branches: [main, release, alpha]

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos

      - run: dart format --output=none --set-exit-if-changed lib/

  test:
    name: Run Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - run: flutter test --coverage

  build-alpha:
    name: Build Alpha Release
    needs: test
    if: github.ref_name == 'alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > ${{ github.workspace }}/android/app/upload-keystore.jks

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Sign APKs (optional alignment)
        run: |
          for apk in build/app/outputs/flutter-apk/*.apk; do
            echo "Signed: $(basename $apk)"
          done

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha-release-aab
          path: build/app/outputs/bundle/release/*.aab

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpha-release-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Generate alpha tag
        id: tag
        run: |
          ALPHA_TAG="v${{ steps.version.outputs.version }}-alpha.${{ github.run_number }}"
          echo "tag=$ALPHA_TAG" >> $GITHUB_OUTPUT

      - name: Create Alpha Release
        uses: softprops/action-gh-release@v2
        with:
          name: TS Music v${{ steps.version.outputs.version }} Alpha #${{ github.run_number }}
          tag_name: ${{ steps.tag.outputs.tag }}
          body: |
            ## Alpha Build #${{ github.run_number }}
            Version: v${{ steps.version.outputs.version }}
            Branch: alpha (${{ github.sha }})
          files: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: true

  build-stable:
    name: Build Stable Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > ${{ github.workspace }}/android/app/upload-keystore.jks

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Sign APKs (optional alignment)
        run: |
          for apk in build/app/outputs/flutter-apk/*.apk; do
            echo "Signed: $(basename $apk)"
          done

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/*.aab

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TS Music v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false
