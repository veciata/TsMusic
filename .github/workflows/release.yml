name: Release

on:
  push:
    branches: [main, release]
    tags: ['v*']
  pull_request:
    branches: [main, release]

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos

      - run: dart format --output=none --set-exit-if-changed lib/

  # ── LATEST TRACK: build and update "latest" release on main push ──
  build-latest:
    name: Build Latest Release
    needs: lint
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEY_JKS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > ${{ github.workspace }}/android/app/keystore.jks
          keytool -importkeystore \
            -srckeystore ${{ github.workspace }}/android/app/keystore.jks \
            -destkeystore ${{ github.workspace }}/android/app/keystore.jks \
            -srcstoretype pkcs12 \
            -deststoretype pkcs12 \
            -srcstorepass "$KEY_PASSWORD" \
            -deststorepass "$KEY_PASSWORD" \
            -srcalias "${{ secrets.KEY_ALIAS }}" \
            -destalias "${{ secrets.KEY_ALIAS }}" \
            -srckeypass "$KEY_PASSWORD" \
            -destkeypass "$KEY_PASSWORD" \
            -J-Dkeystore.pkcs12.legacy

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Delete old latest release
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Create Latest Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest \
            --title "TS Music v${{ steps.version.outputs.version }} (Latest)" \
            --notes "## Latest Build
          Version: v${{ steps.version.outputs.version }}
          Commit: ${{ github.sha }}
          Branch: main
          Package: \`com.veciata.tsmusic\` (stable)" \
            --latest \
            build/app/outputs/bundle/release/*.aab \
            build/app/outputs/flutter-apk/*.apk

  # ── STABLE TRACK: build and release on tag push ──
  test-stable:
    name: Run Tests (Stable)
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - run: flutter test

  build-stable:
    name: Build Stable Release
    needs: [lint, test-stable]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEY_JKS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > ${{ github.workspace }}/android/app/keystore.jks
          keytool -importkeystore \
            -srckeystore ${{ github.workspace }}/android/app/keystore.jks \
            -destkeystore ${{ github.workspace }}/android/app/keystore.jks \
            -srcstoretype pkcs12 \
            -deststoretype pkcs12 \
            -srcstorepass "$KEY_PASSWORD" \
            -deststorepass "$KEY_PASSWORD" \
            -srcalias "${{ secrets.KEY_ALIAS }}" \
            -destalias "${{ secrets.KEY_ALIAS }}" \
            -srckeypass "$KEY_PASSWORD" \
            -destkeypass "$KEY_PASSWORD" \
            -J-Dkeystore.pkcs12.legacy

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TS Music v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false


