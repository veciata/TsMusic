name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4.2.0
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Auto-increment build number
        id: version
        run: |
          # Mevcut versiyonu al
          CURRENT_VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          echo "Current version: $CURRENT_VERSION"
          
          # Tag'den versiyon numarasını al (v1.1.3 → 1.1.3)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Not a version tag push, skip version bump
            echo "Not a version tag push, using current version"
            # Parse current version without build number
            if [[ $CURRENT_VERSION =~ ^([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              TAG_VERSION="${BASH_REMATCH[1]}"
            else
              TAG_VERSION="1.0.0"
            fi
          fi
          echo "Tag version: $TAG_VERSION"
          
          # Mevcut build numarasını al
          if [[ $CURRENT_VERSION =~ \+([0-9]+)$ ]]; then
            BUILD_NUM="${BASH_REMATCH[1]}"
          else
            BUILD_NUM="0"
          fi
          echo "Current build: $BUILD_NUM"
          
          # Yeni build numarası = eski + 6
          NEW_BUILD=$((BUILD_NUM + 6))
          echo "New build: $NEW_BUILD"
          
          # pubspec.yaml'i güncelle (use | as delimiter to avoid issues with /)
          sed -i "s|^version:.*|version: ${TAG_VERSION}+${NEW_BUILD}|" pubspec.yaml
          echo "Updated to: ${TAG_VERSION}+${NEW_BUILD}"
          
          # Output olarak kaydet
          echo "version=${TAG_VERSION}+${NEW_BUILD}" >> $GITHUB_OUTPUT
      
      - name: Build APK
        run: flutter build apk --release
        env:
          VERSION: ${{ steps.version.outputs.version }}
      
      - name: Commit version update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2.2.1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
