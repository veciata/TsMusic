name: Release

on:
  push:
    branches: [main, release, alpha]
    tags: ['v*']
  pull_request:
    branches: [main, release, alpha]

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - run: dart format --output=none --set-exit-if-changed lib/

  # ── ALPHA TRACK: build prerelease first, then run tests ──
  build-alpha:
    name: Build Alpha Prerelease
    needs: lint
    if: github.ref_name == 'alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > ${{ github.workspace }}/android/app/upload-keystore.jks

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha-release-aab
          path: build/app/outputs/bundle/release/*.aab

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpha-release-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Generate alpha tag
        id: tag
        run: |
          ALPHA_TAG="v${{ steps.version.outputs.version }}-alpha.${{ github.run_number }}"
          echo "tag=$ALPHA_TAG" >> $GITHUB_OUTPUT

      - name: Create Alpha Prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          V="${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "TS Music v${V} Alpha #${{ github.run_number }}" \
            --notes "## Alpha Build #${{ github.run_number }}
          Version: v${V}
          Branch: alpha (${{ github.sha }})
          **Tests:** running after build" \
            --prerelease \
            build/app/outputs/bundle/release/*.aab \
            build/app/outputs/flutter-apk/*.apk

  test-alpha:
    name: Run Tests (Alpha)
    needs: build-alpha
    if: github.ref_name == 'alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - run: flutter test

      - name: Update prerelease with test result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          TAG="v${V}-alpha.${{ github.run_number }}"
          gh release edit "$TAG" \
            --notes "## Alpha Build #${{ github.run_number }}
          Version: v${V}
          Branch: alpha (${{ github.sha }})
          **Tests:** ✅ passed"

  # ── STABLE TRACK: build and release on tag push ──
  test-stable:
    name: Run Tests (Stable)
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - run: flutter test

  build-stable:
    name: Build Stable Release
    needs: [lint, test-stable]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > ${{ github.workspace }}/android/app/upload-keystore.jks

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TS Music v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false


