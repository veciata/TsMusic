name: Alpha

on:
  push:
    branches: [alpha]

concurrency:
  group: alpha-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - run: flutter pub get

      - name: Decode keystore (if available)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No keystore secret set — building unsigned"
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > ${{ github.workspace }}/android/app/keystore.jks
          keytool -importkeystore \
            -srckeystore ${{ github.workspace }}/android/app/keystore.jks \
            -destkeystore ${{ github.workspace }}/android/app/keystore.jks \
            -srcstoretype pkcs12 \
            -deststoretype pkcs12 \
            -srcstorepass "$KEY_PASSWORD" \
            -deststorepass "$KEY_PASSWORD" \
            -srcalias "${{ secrets.KEY_ALIAS }}" \
            -destalias "${{ secrets.KEY_ALIAS }}" \
            -srckeypass "$KEY_PASSWORD" \
            -destkeypass "$KEY_PASSWORD" \
            -J-Dkeystore.pkcs12.legacy || \
            echo "Keystore re-encode failed (non-fatal), using original"

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-alpha.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build APK (alpha app ID)
        env:
          ALPHA_BUILD: true
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build apk --release --split-per-abi

      - name: Build AAB (alpha app ID)
        env:
          ALPHA_BUILD: true
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build appbundle --release

      - name: Create Prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          V="${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "TS Music v${V} Alpha #${{ github.run_number }}" \
            --notes "## Alpha Build #${{ github.run_number }}
          Version: v${V}
          Branch: alpha (${{ github.sha }})
          Package: \`com.veciata.tsmusic.alpha\` (installs alongside stable)" \
            --prerelease \
            build/app/outputs/bundle/release/*.aab \
            build/app/outputs/flutter-apk/*.apk
